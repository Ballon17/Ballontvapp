<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BALLON TV | SUPREME V7 2027</title>

    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary: #d4af37; /* ذهبي */
            --primary-dark: #aa8a2e;
            --bg-dark: #01241a; /* أخضر ملكي غامق */
            --surface: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(212, 175, 55, 0.3);
            --text-main: #ffffff;
            --text-dim: #b0c4bc;
            --font-main: 'Tajawal', sans-serif;
            --radius: 20px;
            --transition: all 0.25s ease-out;
        }

        ::-webkit-scrollbar { width: 0px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0; padding: 0; overflow-x: hidden;
            user-select: none;
        }

        /* لودر الصفحة */
        #loader {
            position: fixed; top: 0; left: 0; height: 3px; width: 0;
            background: var(--primary); z-index: 10001; transition: width 0.3s ease;
        }

        /* الهيدر */
        .app-header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(1, 36, 26, 0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .brand-logo { font-weight: 900; font-size: 1.4rem; color: white; font-style: italic; }
        .brand-logo span { color: var(--primary); }

        /* حاوية القنوات */
        .grid { 
            display: grid; gap: 12px; padding: 20px 15px 100px; 
            max-width: 1200px; margin: 0 auto; 
        }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); } }

        /* الكروت */
        .card {
            background: var(--surface); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius); padding: 12px; display: flex; flex-direction: row-reverse;
            align-items: center; text-decoration: none; transition: var(--transition);
        }
        .card:focus, .card:hover { 
            border-color: var(--primary); background: rgba(212, 175, 55, 0.1); 
            transform: scale(1.02); outline: none; box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .img-container {
            width: 65px; height: 65px; min-width: 65px;
            border-radius: 15px; overflow: hidden; border: 1px solid var(--glass-border);
        }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { flex-grow: 1; padding: 0 15px; text-align: right; }
        .card-title { color: var(--text-main); font-size: 1rem; font-weight: 800; display: block; }
        .card-subtitle { color: var(--text-dim); font-size: 0.75rem; }

        /* نافذة الربح المنبثقة */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .modal-card {
            background: #01241a; border: 2px solid var(--primary);
            border-radius: 30px; max-width: 350px; width: 100%; padding: 30px; text-align: center;
        }

        .modal-btn {
            background: var(--primary); color: var(--bg-dark); 
            text-decoration: none; padding: 14px; border-radius: 15px; margin-top: 20px;
            font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: var(--transition); border: none; cursor: pointer; width: 100%; font-size: 1rem;
        }
        .modal-btn:focus { transform: scale(1.1); box-shadow: 0 0 20px var(--primary); }
    </style>
</head>
<body>

    <div id="loader"></div>

    <!-- نافذة تنشيط الأرباح -->
    <div id="profitModal" class="modal-overlay">
        <div class="modal-card animate__animated animate__zoomIn">
            <div style="font-size: 3rem; color: var(--primary); margin-bottom: 15px;">
                <i class="fa-solid fa-unlock-keyhole"></i>
            </div>
            <h2 style="color: var(--primary); margin: 0 0 10px;">تنشيط الوصول المجاني</h2>
            <p style="color: #ccc; font-size: 0.9rem; line-height: 1.5;">اضغط على الزر أدناه لتنشيط سيرفرات BALLON TV لليوم. (سيفتح لك رابط التنشيط في نافذة جديدة)</p>
            
            <button onclick="startEarningFlow()" class="modal-btn" id="startBtn">
                <i class="fa-solid fa-bolt"></i> تنشيط الآن
            </button>
        </div>
    </div>

    <header class="app-header">
        <div class="brand-logo">BALLON<span>TV</span></div>
        <div style="font-size: 0.7rem; background: var(--primary); color: #000; padding: 2px 8px; border-radius: 5px; font-weight: 900;">V7 SUPREME</div>
    </header>

    <div class="grid" id="main-grid"></div>

    <script>
        // 1. روابط الربح الخاصة بك (omg10)
        const myProfitLinks = [
            "https://omg10.com/4/10270118",
            "https://omg10.com/4/10185036",
            "https://omg10.com/4/9093521",
            "https://omg10.com/4/9047517",
            "https://omg10.com/4/10241472"
        ];

        // 2. قائمة القنوات
        const allContent = [         
            { id: 2, name: "قنوات كاس العالم", sub: "تغطية شاملة للمونديال", img: "https://l.top4top.io/p_3805kmnv00.jpg" },
            { id: 3, name: "BEIN SPORT", sub: "مجموعة بين سبورت كاملة", img: "https://g.top4top.io/p_3784r8k2z2.png" },
            { id: 4, name: "STARZIK", sub: "باقة الأفلام والمسلسلات", img: "https://f.top4top.io/p_3644ln4xw1.jpg" },
            { id: 5, name: "MBC SPORT", sub: "الدوري السعودي والبطولات", img: "https://c.top4top.io/p_36445ddtq1.jpg" },
            { id: 8, name: "GROUPE MBC", sub: "قنوات MBC بجودة HD", img: "https://b.top4top.io/p_3790ttwy30.png" },
            { id: 12, name: "STC SPORT", sub: "قنوات SSC الرياضية", img: "https://b.top4top.io/p_37901pxgm0.png" },
            { id: 14, name: "ELKASS", sub: "قنوات الكأس القطرية", img: "https://j.top4top.io/p_3792hr5pp0.png" },
            { id: 16, name: "SHAHID", sub: "محتوى شاهد VIP حصرياً", img: "https://a.top4top.io/p_3792sb27n0.jpg" },
            { id: 18, name: "ABUDHABI", sub: "قنوات أبوظبي الرياضية", img: "https://upload.wikimedia.org/wikipedia/commons/d/d7/Abu_Dhabi_TV_logo_2023.png" }
        ];

        // 3. وظيفة الربح والدخول
        function startEarningFlow() {
            // اختيار رابط عشوائي
            const randomLink = myProfitLinks[Math.floor(Math.random() * myProfitLinks.length)];
            
            // فتح الرابط في نافذة جديدة
            window.open(randomLink, '_blank');
            
            // إخفاء النافذة المنبثقة والسماح للمستخدم بالتصفح
            document.getElementById('profitModal').style.display = 'none';
            
            // إظهار لودر خفيف
            document.getElementById('loader').style.width = '100%';
            setTimeout(() => { document.getElementById('loader').style.width = '0'; }, 800);
        }

        // 4. بناء الشبكة
        function buildGrid() {
            const grid = document.getElementById('main-grid');
            allContent.forEach((item, index) => {
                const a = document.createElement('a');
                a.href = `go:${item.id}`; // سيعمل داخل AppCreator24 لفتح القسم
                a.className = 'card animate__animated animate__fadeInUp';
                a.style.animationDelay = `${index * 0.05}s`;
                a.setAttribute('tabindex', '0');
                a.innerHTML = `
                    <div class="img-container"><img src="${item.img}" class="card-img" loading="lazy"></div>
                    <div class="card-info">
                        <span class="card-title">${item.name}</span>
                        <span class="card-subtitle">${item.sub}</span>
                    </div>
                    <div style="color:var(--primary);"><i class="fa-solid fa-circle-play"></i></div>
                `;
                grid.appendChild(a);
            });
        }

        // 5. التحكم بالريموت (أسهم لوحة المفاتيح)
        document.addEventListener('keydown', function(e) {
            const elements = Array.from(document.querySelectorAll('a[tabindex="0"], button')).filter(el => el.offsetParent !== null);
            let currentIndex = elements.indexOf(document.activeElement);

            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                currentIndex = (currentIndex + 1) % elements.length;
                elements[currentIndex].focus();
                e.preventDefault();
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                currentIndex = (currentIndex - 1 + elements.length) % elements.length;
                elements[currentIndex].focus();
                e.preventDefault();
            } else if (e.key === 'Enter') {
                document.activeElement.click();
            }
        });

        window.onload = () => {
            buildGrid();
            // وضع التركيز على زر التنشيط فوراً لدعم الريموت
            document.getElementById('startBtn').focus();
        };
    </script>
</body>
</html>
