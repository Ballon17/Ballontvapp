<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BALLON TV | HOME</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --primary: #d4af37; --bg-dark: #01241a; --surface: rgba(255, 255, 255, 0.05); --glass-border: rgba(212, 175, 55, 0.3); --text-main: #ffffff; --radius: 20px; --transition: all 0.25s ease-out; }
        ::-webkit-scrollbar { width: 0px; }
        body { background-color: var(--bg-dark); background-image: radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 40%); color: var(--text-main); font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; overflow-x: hidden; user-select: none; }
        .app-header { position: sticky; top: 0; z-index: 1000; background: rgba(1, 36, 26, 0.9); backdrop-filter: blur(10px); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); }
        .brand-logo { font-weight: 900; font-size: 1.4rem; color: white; font-style: italic; }
        .brand-logo span { color: var(--primary); }
        .grid { display: grid; gap: 12px; padding: 20px 15px 100px; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        .card { background: var(--surface); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: var(--radius); padding: 12px; display: flex; flex-direction: row-reverse; align-items: center; text-decoration: none; transition: var(--transition); cursor: pointer; }
        .card:focus, .card:hover { border-color: var(--primary); background: rgba(212, 175, 55, 0.1); transform: scale(1.02); outline: none; }
        .img-container { width: 65px; height: 65px; min-width: 65px; border-radius: 15px; overflow: hidden; border: 1px solid var(--glass-border); background: #fff; display: flex; align-items: center; justify-content: center; }
        .card-img { width: 100%; height: 100%; object-fit: contain; }
        .card-info { flex-grow: 1; padding: 0 15px; text-align: right; }
        .card-title { color: var(--text-main); font-size: 1rem; font-weight: 800; display: block; }
        .card-subtitle { color: #b0c4bc; font-size: 0.75rem; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: #01241a; border: 2px solid var(--primary); border-radius: 30px; max-width: 350px; width: 100%; padding: 30px; text-align: center; }
        .modal-btn { background: var(--primary); color: #000; padding: 14px; border-radius: 15px; margin-top: 20px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div id="profitModal" class="modal-overlay">
        <div class="modal-card animate__animated animate__zoomIn">
            <i class="fa-solid fa-unlock-keyhole" style="font-size: 3rem; color: var(--primary); margin-bottom: 15px;"></i>
            <h2 style="color: var(--primary);">تنشيط السيرفر الرئيسي</h2>
            <p style="color: #ccc; font-size: 0.9rem;">اضغط للتنشيط والدخول للباقات العامة (يفتح في نافذة جديدة).</p>
            <button onclick="handleActivation()" class="modal-btn" id="startBtn">تنشيط الآن</button>
        </div>
    </div>
    <header class="app-header"><div class="brand-logo">BALLON<span>TV</span></div></header>
    <div class="grid" id="main-grid"></div>
    <script>
        const profitLinks = ["https://omg10.com/4/10270118", "https://omg10.com/4/10185036", "https://omg10.com/4/9093521", "https://omg10.com/4/9047517", "https://omg10.com/4/10241472"];
        function handleActivation() { window.open(profitLinks[Math.floor(Math.random() * profitLinks.length)], '_blank'); document.getElementById('profitModal').style.display = 'none'; }
        
        const content = [
            { id: "worldcup.html", name: "قسم كأس العالم PRO", sub: "تغطية شاملة 4K", img: "https://l.top4top.io/p_3805kmnv00.jpg", isPage: true },
            { id: "3", name: "BEIN SPORT", sub: "مجموعة بين سبورت كاملة", img: "https://g.top4top.io/p_3784r8k2z2.png" },
            { id: "16", name: "SHAHID", sub: "محتوى شاهد VIP حصرياً", img: "https://a.top4top.io/p_3792sb27n0.jpg" },
            { id: "5", name: "MBC SPORT", sub: "الدوري السعودي", img: "https://c.top4top.io/p_36445ddtq1.jpg" }
        ];

        const grid = document.getElementById('main-grid');
        content.forEach(item => {
            const a = document.createElement('a');
            a.className = 'card'; a.setAttribute('tabindex', '0');
            a.onclick = () => { if(item.isPage) window.location.href = item.id; else window.location.href = `go:${item.id}`; };
            a.innerHTML = `<div class="img-container"><img src="${item.img}" class="card-img"></div><div class="card-info"><span class="card-title">${item.name}</span><span class="card-subtitle">${item.sub}</span></div><i class="fa-solid fa-chevron-left" style="color:var(--primary)"></i>`;
            grid.appendChild(a);
        });

        document.addEventListener('keydown', (e) => {
            const elements = Array.from(document.querySelectorAll('.card, button')).filter(el => el.offsetParent !== null);
            let index = elements.indexOf(document.activeElement);
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { index = (index + 1) % elements.length; elements[index].focus(); }
            else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { index = (index - 1 + elements.length) % elements.length; elements[index].focus(); }
            else if (e.key === 'Enter') document.activeElement.click();
        });
        window.onload = () => document.getElementById('startBtn').focus();
    </script>
</body>
</html>
