<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BALLON TV | جدول المباريات</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary: #d4af37;
            --bg-dark: #01241a;
            --surface: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(212, 175, 55, 0.3);
            --radius: 20px;
        }

        ::-webkit-scrollbar { width: 0px; }
        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .app-header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(1, 36, 26, 0.9); backdrop-filter: blur(15px);
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }
        .brand-logo { font-weight: 900; font-size: 1.4rem; color: white; font-style: italic; }
        .brand-logo span { color: var(--primary); }

        /* التبويبات */
        .tabs-container { display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto; }
        .tab-btn {
            background: var(--surface); border: 1px solid var(--glass-border);
            color: #fff; padding: 10px 15px; border-radius: 12px;
            font-weight: 800; cursor: pointer; flex: 1; text-align: center; font-size: 0.8rem;
        }
        .tab-btn.active { background: var(--primary); color: #000; }

        /* حاوية الجدول */
        .match-section { display: none; padding: 10px 15px; }
        .match-section.active { display: block; }
        .anub-card { background: rgba(255,255,255,0.03); border-radius: var(--radius); padding: 10px; border: 1px solid var(--glass-border); min-height: 200px; }

        /* التنشيط */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); z-index: 10005; 
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-card {
            background: #01241a; border: 2px solid var(--primary);
            border-radius: 30px; max-width: 350px; width: 100%; padding: 30px; text-align: center;
        }
        .modal-btn { background: var(--primary); color: #000; padding: 15px; border-radius: 15px; font-weight: 900; border: none; width: 100%; cursor: pointer; }

        .download-banner {
            background: linear-gradient(135deg, #d4af37, #aa8a2e);
            margin: 15px; padding: 15px; border-radius: var(--radius);
            display: flex; justify-content: space-between; align-items: center;
            color: #000; text-decoration: none; font-weight: 900;
        }
    </style>
</head>
<body>

    <div id="activationModal" class="modal-overlay">
        <div class="modal-card">
            <i class="fa-solid fa-bolt" style="font-size: 3rem; color: var(--primary); margin-bottom: 15px;"></i>
            <h2 style="color: var(--primary);">تنشيط السيرفر</h2>
            <p style="color: #ccc; font-size: 0.85rem;">اضغط لتنشيط جدول المباريات والبث المباشر لليوم.</p>
            <button onclick="activateNow()" class="modal-btn" id="activeBtn">تنشيط الآن</button>
        </div>
    </div>

    <header class="app-header">
        <div class="brand-logo">BALLON<span>TV</span></div>
    </header>

    <a href="javascript:void(0)" onclick="handleAd('https://www.mediafire.com/file/7754umghlhk95sx/BALLONPLAYER-V7.apk/file')" class="download-banner">
        <span style="font-size: 0.85rem;"><i class="fa-solid fa-download"></i> تحميل المشغل V7</span>
        <span style="background:#000; color:#fff; padding:4px 10px; border-radius:8px; font-size:0.7rem;">تحميل</span>
    </a>

    <div class="tabs-container">
        <div class="tab-btn" onclick="showDay('yesterday', this)">الأمس</div>
        <div class="tab-btn active" onclick="showDay('today', this)">اليوم</div>
        <div class="tab-btn" onclick="showDay('tomorrow', this)">الغد</div>
    </div>

    <!-- جداول المباريات -->
    <!-- ملاحظة: يجب أن تكون مرئية لحظة تشغيل السكريبت لتعمل بشكل صحيح -->
    <div id="yesterday" class="match-section">
        <div class="anub-card">
            <AnubMatch day='yesterday' auto='true' url="" num='1'></AnubMatch>
        </div>
    </div>

    <div id="today" class="match-section active">
        <div class="anub-card">
            <AnubMatch day='today' auto='true' url="" num='1'></AnubMatch>
        </div>
    </div>

    <div id="tomorrow" class="match-section">
        <div class="anub-card">
            <AnubMatch day='tomorrow' auto='true' url="" num='1'></AnubMatch>
        </div>
    </div>

    <div style="padding: 20px; text-align: center;">
        <button onclick="handleAd('worldcup.html')" class="modal-btn" style="width: auto; padding: 10px 30px;">
            <i class="fa-solid fa-trophy"></i> قسم كأس العالم PRO
        </button>
    </div>

    <!-- استدعاء السكريبت في النهاية تماماً -->
    <script src="https://dev.anubis-web.com/TableMatchAuto/TMA.js"></script>

    <script>
        const links = ["https://omg10.com/4/10270118", "https://omg10.com/4/10185036", "https://omg10.com/4/9093521", "https://omg10.com/4/9047517", "https://omg10.com/4/10241472"];
        
        function openAd() {
            window.open(links[Math.floor(Math.random() * links.length)], '_blank');
        }

        function activateNow() {
            openAd();
            document.getElementById('activationModal').style.display = 'none';
        }

        function handleAd(url) {
            openAd();
            setTimeout(() => { window.location.href = url; }, 800);
        }

        function showDay(dayId, btn) {
            document.querySelectorAll('.match-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(dayId).style.display = 'block';
            btn.classList.add('active');
        }

        window.onload = () => { document.getElementById('activeBtn').focus(); };
    </script>
</body>
</html>
