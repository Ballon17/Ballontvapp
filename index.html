<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BALLON TV | SUPREME V7 2027</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary: #d4af37; 
            --primary-dark: #aa8a2e;
            --bg-dark: #01241a; 
            --surface: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(212, 175, 55, 0.3);
            --text-main: #ffffff;
            --text-dim: #b0c4bc;
            --font-main: 'Tajawal', sans-serif;
            --radius: 20px;
            --transition: all 0.25s ease-out;
        }

        ::-webkit-scrollbar { width: 0px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0; padding: 0; overflow-x: hidden;
        }

        #loader { position: fixed; top: 0; left: 0; height: 3px; width: 0; background: var(--primary); z-index: 10001; transition: width 0.3s ease; }

        .app-header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(1, 36, 26, 0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .brand-logo { font-weight: 900; font-size: 1.4rem; color: white; font-style: italic; }
        .brand-logo span { color: var(--primary); }

        /* زر الربح المخفي والذكي */
        .grid { display: grid; gap: 12px; padding: 10px 15px 100px; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        .card {
            background: var(--surface); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius); padding: 10px; display: flex; flex-direction: row-reverse;
            align-items: center; text-decoration: none; transition: var(--transition);
        }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }

        .img-container { width: 60px; height: 60px; min-width: 60px; border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border); }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { flex-grow: 1; padding: 0 12px; text-align: right; }
        .card-title { color: var(--text-main); font-size: 0.95rem; font-weight: 800; display: block; }
        .card-subtitle { color: var(--text-dim); font-size: 0.7rem; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .modal-card {
            background: #01241a; border: 2px solid var(--primary);
            border-radius: 25px; max-width: 320px; width: 100%; padding: 25px; text-align: center;
        }

        .modal-btn {
            text-decoration: none; padding: 12px; border-radius: 12px; margin-top: 10px;
            font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: var(--transition); cursor: pointer; border: none; width: 100%;
        }
        .btn-update { background: var(--primary); color: var(--bg-dark); }
        .btn-close { background: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body>

    <div id="loader"></div>

    <!-- نافذة الأرباح والدخول -->
    <div id="updateModal" class="modal-overlay">
        <div class="modal-card animate__animated animate__zoomIn">
            <div style="font-size: 2.5rem; color: var(--primary); margin-bottom: 15px;"><i class="fa-solid fa-shield-halved"></i></div>
            <h2 style="color: var(--primary); margin: 0 0 10px; font-size: 1.2rem;">تنشيط الوصول الآمن</h2>
            <p style="font-size: 0.85rem; color: #ccc;">اضغط على الزر أدناه لتنشيط سيرفرات المشاهدة لليوم.</p>
            
            <div class="modal-actions">
                <!-- هذا الزر يفتح الرابط الربحي -->
                <button onclick="handleEntry()" class="modal-btn btn-update">
                    <i class="fa-solid fa-bolt"></i> تنشيط السيرفر الآن
                </button>
            </div>
        </div>
    </div>

    <header class="app-header">
        <div class="brand-logo">BALLON<span>TV</span></div>
    </header>

    <div class="grid" id="main-grid"></div>

    <script>
        // قائمة روابط الربح الخاصة بك
        const profitLinks = [
            "https://omg10.com/4/10270118",
            "https://omg10.com/4/10185036",
            "https://omg10.com/4/9093521",
            "https://omg10.com/4/9047517",
            "https://omg10.com/4/10241472"
        ];

        // وظيفة اختيار رابط عشوائي وفتحه
        function triggerAd() {
            const randomLink = profitLinks[Math.floor(Math.random() * profitLinks.length)];
            window.open(randomLink, '_blank');
        }

        // وظيفة الدخول (تفتح الربح وتغلق النافذة)
        function handleEntry() {
            triggerAd(); // فتح الرابط الربحي في تاب جديد
            document.getElementById('updateModal').style.display = 'none'; // إخفاء النافذة
            localStorage.setItem('ad_session', Date.now()); // تسجيل الدخول
        }

        const allContent = [         
            { id: 2, name: "قنوات كاس العالم", sub: "تغطية شاملة للمونديال", img: "https://l.top4top.io/p_3805kmnv00.jpg" },
            { id: 3, name: "BEIN SPORT", sub: "مجموعة بين سبورت كاملة", img: "https://g.top4top.io/p_3784r8k2z2.png" },
            { id: 4, name: "STARZIK", sub: "باقة الأفلام والمسلسلات", img: "https://f.top4top.io/p_3644ln4xw1.jpg" },
            { id: 5, name: "MBC SPORT", sub: "الدوري السعودي والبطولات", img: "https://c.top4top.io/p_36445ddtq1.jpg" },
            { id: 8, name: "GROUPE MBC", sub: "قنوات MBC بجودة HD", img: "https://b.top4top.io/p_3790ttwy30.png" },
            { id: 12, name: "STC SPORT", sub: "قنوات SSC الرياضية", img: "https://b.top4top.io/p_37901pxgm0.png" },
            { id: 14, name: "ELKASS", sub: "قنوات الكأس القطرية", img: "https://j.top4top.io/p_3792hr5pp0.png" },
            { id: 16, name: "SHAHID", sub: "محتوى شاهد VIP حصرياً", img: "https://a.top4top.io/p_3792sb27n0.jpg" }
        ];

        function build() {
            const grid = document.getElementById('main-grid');
            allContent.forEach((item, index) => {
                const a = document.createElement('a');
                a.href = "#"; // هنا تضع رابط القناة الفعلي
                a.className = 'card animate__animated animate__fadeInUp';
                a.style.animationDelay = `${index * 0.05}s`;
                a.onclick = (e) => {
                    e.preventDefault();
                    // يمكنك إضافة رابط ربحي عشوائي هنا أيضاً عند الضغط على أي قناة
                };
                a.innerHTML = `
                    <div class="img-container"><img src="${item.img}" class="card-img" loading="lazy"></div>
                    <div class="card-info">
                        <span class="card-title">${item.name}</span>
                        <span class="card-subtitle">${item.sub}</span>
                    </div>
                    <div style="color:var(--primary); font-size:0.8rem;"><i class="fa-solid fa-play"></i></div>
                `;
                grid.appendChild(a);
            });
        }

        window.onload = () => {
            build();
            // لودر بسيط
            document.getElementById('loader').style.width = '100%';
            setTimeout(() => { document.getElementById('loader').style.width = '0'; }, 1000);
        };
    </script>
</body>
</html>
