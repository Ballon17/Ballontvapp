<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BALLON TV | IMPERIAL V10 SUPREME</title>

    <!-- الخطوط والتقنيات العالمية -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary: #d4af37; /* ذهبي ملكي */
            --bg-black: #000000;
            --card-bg: #0a0a0a;
            --live-color: #ff0000;
            --glass-border: rgba(212, 175, 55, 0.2);
            --neon-glow: 0 0 20px rgba(212, 175, 55, 0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        ::-webkit-scrollbar { width: 0px; }
        body {
            background-color: var(--bg-black);
            background-image: radial-gradient(circle at top right, #01241a, transparent 50%);
            color: #fff; font-family: 'Tajawal', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; user-select: none;
        }

        /* لودر التحميل العلوي الذكي */
        #top-loader {
            position: fixed; top: 0; left: 0; height: 3px; width: 0%;
            background: linear-gradient(90deg, var(--primary), #fff);
            z-index: 10005; transition: width 0.4s ease;
        }

        /* هيدر إمبراطوري */
        .app-header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px);
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); box-shadow: 0 5px 30px rgba(0,0,0,0.8);
        }
        .brand-logo { font-weight: 900; font-size: 1.5rem; font-style: italic; }
        .brand-logo span { color: var(--primary); }
        #gmt-clock { color: var(--primary); font-weight: 900; font-size: 0.85rem; }

        /* بانر تحميل المشغل (ذهبي نيون) */
        .dl-banner {
            background: linear-gradient(135deg, #d4af37, #aa8a2e);
            margin: 15px; padding: 20px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            color: #000; text-decoration: none; font-weight: 900;
            box-shadow: var(--neon-glow); animation: pulse 2s infinite; cursor: pointer;
        }
        @keyframes pulse { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.02);} }

        /* تبويبات الأيام الذكية */
        .tabs-container { display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto; scrollbar-width: none; }
        .tab-btn {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            color: #fff; padding: 12px 20px; border-radius: 12px;
            font-weight: 800; font-size: 0.8rem; cursor: pointer; flex: 1; text-align: center;
            white-space: nowrap; transition: var(--transition);
        }
        .tab-btn.active { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
        .tab-btn:focus { outline: 3px solid #fff; transform: scale(1.05); }

        /* تصنيفات الدوريات */
        .league-label {
            padding: 8px 20px; font-weight: 900; font-size: 0.95rem; color: #fff; 
            border-right: 4px solid var(--primary); margin: 20px 15px 10px;
            background: rgba(212, 175, 55, 0.05); display: inline-block; border-radius: 0 10px 10px 0;
        }

        /* كروت المباريات من الـ API */
        .match-card {
            background: var(--card-bg); border-radius: 20px; padding: 15px 10px;
            margin: 0 15px 12px; display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; border: 1px solid rgba(255,255,255,0.05); transition: var(--transition);
        }
        .match-card:focus, .match-card:hover { border-color: var(--primary); transform: translateY(-3px); background: rgba(212,175,55,0.05); outline: none; }

        .team { text-align: center; }
        .team img { width: 48px; height: 48px; object-fit: contain; background: #fff; border-radius: 50%; padding: 4px; margin-bottom: 5px; }
        .team-name { font-size: 0.8rem; font-weight: 800; display: block; }
        .match-info { text-align: center; min-width: 100px; }
        .score { font-size: 1.7rem; font-weight: 900; color: var(--primary); letter-spacing: 3px; }
        .live-tag { color: var(--live-color); font-size: 0.65rem; font-weight: 900; animation: flash 1s infinite; }
        @keyframes flash { 50% { opacity: 0.3; } }

        /* باقات القنوات الإمبراطورية */
        .grid { display: grid; gap: 12px; padding: 0 15px 100px; grid-template-columns: repeat(2, 1fr); }
        .channel-card {
            background: var(--card-bg); border-radius: 18px; padding: 12px;
            border: 1px solid var(--glass-border); display: flex; flex-direction: row-reverse;
            align-items: center; text-decoration: none; transition: var(--transition);
        }
        .channel-card:focus, .channel-card:hover { border-color: var(--primary); background: rgba(212,175,55,0.1); outline: none; }
        .ch-img-cont { width: 50px; height: 50px; min-width: 50px; background: #fff; border-radius: 12px; padding: 5px; display: flex; align-items: center; justify-content: center; }
        .ch-img { width: 100%; height: 100%; object-fit: contain; }
        .ch-info { flex-grow: 1; padding-right: 12px; text-align: right; }
        .ch-name { font-size: 0.85rem; font-weight: 900; color: #fff; }

        /* نافذة التنشيط والسيرفرات */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); z-index: 10000; display: flex;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-card {
            background: #01241a; border: 2px solid var(--primary);
            border-radius: 35px; max-width: 380px; width: 100%; padding: 35px; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        .modal-btn {
            background: var(--primary); color: #000; padding: 16px; border-radius: 15px;
            margin-top: 25px; font-weight: 900; border: none; width: 100%; cursor: pointer; font-size: 1.1rem;
        }

        .server-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #050505; border-top: 3px solid var(--primary);
            border-radius: 35px 35px 0 0; z-index: 10001; transition: 0.5s;
            padding: 30px 20px; box-shadow: 0 -10px 50px rgba(0,0,0,0.9);
        }
        .server-modal.active { bottom: 0; }
        .server-item {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            padding: 18px; border-radius: 18px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .server-item:focus { background: var(--primary); color: #000; outline: none; }
        
        .loading-box { text-align: center; padding: 80px 0; color: var(--primary); }
    </style>
</head>
<body>

    <div id="top-loader"></div>

    <!-- نافذة التنشيط الإمبراطورية -->
    <div id="activationModal" class="modal-overlay">
        <div class="modal-card animate__animated animate__zoomIn">
            <div style="font-size: 4rem; color: var(--primary); margin-bottom: 20px;"><i class="fa-solid fa-crown"></i></div>
            <h2 style="color: var(--primary); margin-bottom: 10px;">التنشيط الإمبراطوري V10</h2>
            <p style="color: #ccc; font-size: 0.9rem; line-height: 1.6;">يجب تنشيط الوصول لبيانات المباريات والبث المباشر لليوم لضمان أعلى جودة 4K.</p>
            <button onclick="handleActivation()" class="modal-btn" id="activeBtn">تنشيط السيرفر الآن</button>
        </div>
    </div>

    <header class="app-header">
        <div class="brand-logo">BALLON<span>TV SUPREME</span></div>
        <div id="gmt-clock">00:00:00</div>
    </header>

    <!-- بانر التحميل الربحي -->
    <div onclick="handleProfitLink('https://www.mediafire.com/file/7754umghlhk95sx/BALLONPLAYER-V7.apk/file')" class="dl-banner">
        <div style="display: flex; align-items: center; gap: 15px;">
            <i class="fa-solid fa-download" style="font-size: 2rem;"></i>
            <div>
                <div style="font-size: 1rem;">تحميل BALLON PLAYER V7</div>
                <div style="font-size: 0.7rem; opacity: 0.8;">إصدار 2027 المستقر - ضروري للتشغيل</div>
            </div>
        </div>
        <div style="background: #000; color: #fff; padding: 6px 15px; border-radius: 10px; font-size: 0.8rem;">تحميل</div>
    </div>

    <!-- تبويبات الأيام مع تحديث الـ API -->
    <div class="tabs-container">
        <div class="tab-btn" onclick="changeDay(-1, this)" tabindex="0">مباريات الأمس</div>
        <div class="tab-btn active" onclick="changeDay(0, this)" tabindex="0">مباريات اليوم</div>
        <div class="tab-btn" onclick="changeDay(1, this)" tabindex="0">مباريات الغد</div>
    </div>

    <!-- حاوية جدول المباريات -->
    <div id="matches-grid">
        <div class="loading-box"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
    </div>

    <!-- باقات القنوات الثابتة -->
    <div class="section-label">الباقات الإمبراطورية المباشرة</div>
    <div class="grid" id="fixed-channels"></div>

    <!-- نافذة السيرفرات والسماوية -->
    <div id="overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; z-index:9999; backdrop-filter:blur(5px);" onclick="closeModal()"></div>
    <div class="server-modal" id="server-modal">
        <div class="text-center mb-4">
            <h6 id="m-title" style="font-weight: 900; color: var(--primary);"></h6>
            <small>اختر جودة البث المناسبة لجهازك</small>
        </div>
        <div id="server-list"></div>
        <button class="btn btn-outline-warning w-100 mt-3 rounded-4" onclick="closeModal()">رجوع</button>
    </div>

    <script>
        // 1. روابط الربح الخمسة (تفتح عشوائياً)
        const MONEY_LINKS = [
            "https://omg10.com/4/10270118", "https://omg10.com/4/10185036",
            "https://omg10.com/4/9093521", "https://omg10.com/4/9047517", "https://omg10.com/4/10241472"
        ];

        const CONFIG = {
            API: 'https://ws.kora-api.space/api/matches/',
            LOGO: 'https://cdn.kora-api.space/uploads/team/',
            PACKAGE: 'com.ballon.player'
        };

        const FIXED_DATA = [
            { id: "worldcup.html", name: "كأس العالم 2026", img: "https://l.top4top.io/p_3805kmnv00.jpg", isPage: true },
            { id: "3", name: "beIN SPORTS", img: "https://g.top4top.io/p_3784r8k2z2.png" },
            { id: "16", name: "SHAHID VIP", img: "https://a.top4top.io/p_3792sb27n0.jpg" },
            { id: "5", name: "SSC SPORT", img: "https://c.top4top.io/p_36445ddtq1.jpg" }
        ];

        // وظيفة اختيار رابط ربح عشوائي
        function triggerProfit() {
            window.open(MONEY_LINKS[Math.floor(Math.random() * MONEY_LINKS.length)], '_blank');
        }

        function handleActivation() {
            triggerProfit();
            document.getElementById('activationModal').style.display = 'none';
            fetchMatches(0);
            renderFixed();
        }

        function handleProfitLink(url) {
            triggerProfit();
            setTimeout(() => { window.location.href = url; }, 800);
        }

        // --- وظيفة جلب وتحديث الـ API ---
        async function fetchMatches(offset) {
            const grid = document.getElementById('matches-grid');
            const loader = document.getElementById('top-loader');
            loader.style.width = '40%';
            grid.innerHTML = '<div class="loading-box"><i class="fas fa-sync fa-spin fa-2x"></i><p class="mt-3">جاري تحديث البيانات من السيرفر...</p></div>';

            const date = new Date();
            date.setDate(date.getDate() + offset);
            const dateStr = date.toISOString().split('T')[0];

            try {
                // استخدام AllOrigins كبروكسي لضمان العمل على GitHub
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(CONFIG.API + dateStr + '/1')}`);
                const raw = await res.json();
                const data = JSON.parse(raw.contents);

                loader.style.width = '100%';
                if (data && data.matches && data.matches.length > 0) {
                    renderMatches(data.matches);
                } else {
                    grid.innerHTML = '<div class="loading-box">لا توجد مباريات متاحة لهذا التاريخ.</div>';
                }
                setTimeout(() => loader.style.width = '0%', 500);
            } catch (e) {
                grid.innerHTML = '<div class="loading-box text-danger">فشل الاتصال بسيرفر البيانات.</div>';
                loader.style.width = '0%';
            }
        }

        function renderMatches(matches) {
            const grid = document.getElementById('matches-grid');
            grid.innerHTML = '';

            const grouped = matches.reduce((acc, m) => {
                const leg = m.league_name || "بطولات منوعة";
                if (!acc[leg]) acc[leg] = [];
                acc[leg].push(m);
                return acc;
            }, {});

            for (const league in grouped) {
                const label = document.createElement('div');
                label.className = 'league-label';
                label.innerText = league;
                grid.appendChild(label);

                grouped[league].forEach(m => {
                    const card = document.createElement('div');
                    card.className = 'match-card animate__animated animate__fadeIn';
                    card.setAttribute('tabindex', '0');
                    card.innerHTML = `
                        <div class="team">
                            <img src="${CONFIG.LOGO}${m.home_logo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1165/1165222.png'">
                            <span class="team-name">${m.home}</span>
                        </div>
                        <div class="match-info">
                            <span class="live-tag">${m.status == '1' ? '• مباشر' : m.time}</span>
                            <div class="score">${m.score || '0 - 0'}</div>
                        </div>
                        <div class="team">
                            <img src="${CONFIG.LOGO}${m.away_logo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1165/1165222.png'">
                            <span class="team-name">${m.away}</span>
                        </div>
                    `;
                    card.onclick = () => openServers(m);
                    card.onkeydown = (e) => { if(e.key === 'Enter') openServers(m); };
                    grid.appendChild(card);
                });
            }
        }

        function renderFixed() {
            const grid = document.getElementById('fixed-channels');
            FIXED_DATA.forEach(ch => {
                const a = document.createElement('a');
                a.className = 'channel-card animate__animated animate__fadeInUp';
                a.setAttribute('tabindex', '0');
                a.onclick = () => handleProfitLink(ch.isPage ? ch.id : `go:${ch.id}`);
                a.innerHTML = `
                    <div class="ch-img-cont"><img src="${ch.img}" class="ch-img"></div>
                    <div class="ch-info">
                        <span class="ch-name">${ch.name}</span>
                        <span style="font-size:0.6rem; color:var(--primary)">باقة VIP 4K</span>
                    </div>
                `;
                grid.appendChild(a);
            });
        }

        function openServers(match) {
            if (match.status == '2') { alert("انتهت المباراة."); return; }
            triggerProfit(); // ربح عند فتح أي مباراة
            document.getElementById('m-title').innerText = `${match.home} × ${match.away}`;
            const list = document.getElementById('server-list');
            list.innerHTML = '';

            const servers = [{name:"سيرفر إمبراطوري 1", id:"0001"}, {name:"سيرفر إمبراطوري 2", id:"0002"}];
            servers.forEach(srv => {
                const d = document.createElement('div');
                d.className = 'server-item';
                d.setAttribute('tabindex', '0');
                d.innerHTML = `<span><i class="fa-solid fa-play text-warning me-2"></i> ${srv.name}</span> <i class="fa-solid fa-chevron-left opacity-30"></i>`;
                d.onclick = () => {
                    window.location.href = `intent://open?id=${srv.id}&title=${encodeURIComponent(match.home+" vs "+match.away)}#Intent;scheme=ballon;package=${CONFIG.PACKAGE};end`;
                };
                list.appendChild(d);
            });

            document.getElementById('server-modal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('server-modal').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }

        function changeDay(offset, btn) {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            triggerProfit(); // ربح عند تبديل الأيام
            fetchMatches(offset);
        }

        // نظام التحكم بالريموت (الأسهم)
        document.addEventListener('keydown', (e) => {
            const focusable = Array.from(document.querySelectorAll('[tabindex="0"], button')).filter(el => el.offsetParent !== null);
            let idx = focusable.indexOf(document.activeElement);
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { idx = (idx + 1) % focusable.length; focusable[idx].focus(); e.preventDefault(); }
            else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { idx = (idx - 1 + focusable.length) % focusable.length; focusable[idx].focus(); e.preventDefault(); }
            else if (e.key === 'Enter') document.activeElement.click();
        });

        setInterval(() => { document.getElementById('gmt-clock').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000);
        window.onload = () => document.getElementById('activeBtn').focus();
    </script>
</body>
</html>
